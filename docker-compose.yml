services:
  app:
    build: .
    ports:
      - "${PORT}:3000"
    environment:
      - NODE_ENV=${NODE_ENV}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_PASSWORD=${DB_PASSWORD}    
      - DB_NAME=${DB_NAME}            
      - DB_USER=${DB_USER}            
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
    depends_on:
      db:
         condition: service_healthy
      redis:
         condition: service_healthy
         
        
      
    


  db:
    image: postgres:15
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s



  redis:
    image: redis:alpine
    volumes:
      - redis-volume:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s


volumes:
  redis-volume:
  postgres-volume:
  

